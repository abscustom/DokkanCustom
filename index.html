<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Custom Dokkan Box</title>
    <style>
        body { background-color: #27272a; color: #ffffff; font-family: sans-serif; text-align: center; padding: 40px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; background: rgba(0,0,0,0.5); padding: 30px; border-radius: 12px; }
        .char-box { text-decoration: none; color: #f8fafc; display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
        .char-box:hover { transform: scale(1.05); z-index: 10; }
        
        .card-icon { position: relative; width: 150px; height: 150px; margin-bottom: 10px; }
        .card-icon img, .card-icon video { position: absolute; pointer-events: none; }
        
        .frame { width: 150px; height: 150px; z-index: 1; top: 0; left: 0; }
        
        /* CHARACTER PORTRAIT RAISED BACK UP */
        .char-img { height: 192px; z-index: 2; bottom: -13px; left: 50%; transform: translateX(-50%); }
        
        .lr-dial { width: 140px; height: 140px; z-index: 1; top: 5px; left: 5px; animation: spin 6s linear infinite; }
        .lr-lightning { z-index: 2; width: 230px; top: -45px; left: -40px; mix-blend-mode: screen; filter: brightness(10) contrast(1.2); }
        
        /* RARITY LOGO (LR/TUR) SHIFTED LOWER */
        .rarity { height: 75px; z-index: 3; bottom: -16px; left: -10px; filter: drop-shadow(0 2px 2px #000); }
        
        .type { height: 55px; z-index: 3; top: -8px; right: -8px; }
        .name-container { width: 150px; overflow: hidden; background: rgba(0,0,0,0.8); border: 1px solid #555; border-radius: 6px; padding: 6px 0; }
        .char-name { font-size: 14px; font-weight: 700; white-space: nowrap; display: inline-block; padding: 0 10px; animation: scroll-text 8s linear infinite; }
        @keyframes scroll-text { 0% { transform: translateX(20%); } 100% { transform: translateX(-100%); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>Character Box</h1>
    <div class="grid">
            <a href="https://abscustom.github.io/test-cha/" target="_blank" class="char-box">
                <div class="card-icon">
                    <img class="frame" src="https://abscustom.github.io/test-cha/images/frame_phy.png">
                    
                        <img class="lr-dial" src="https://abscustom.github.io/test-cha/images/lr_spin_dial.png">
                        <video class="lr-lightning" autoplay muted loop playsinline><source src="https://abscustom.github.io/test-cha/images/lightningfx.webm" type="video/webm"></video>
                    <img class="char-img" src="https://abscustom.github.io/test-cha/images/auto_1776351930990_ipemomrol.png">
                    <img class="rarity" src="https://abscustom.github.io/test-cha/images/rarity_lr.png">
                    <img class="type" src="https://abscustom.github.io/test-cha/images/super_type_phy.png">
                </div>
                <div class="name-container"><div class="char-name">Super Saiyan Goku & Super Saiyan Gohan (Youth) & Super Saiyan Trunks (Teen)</div></div>
            </a></div>
</body>
</html>
